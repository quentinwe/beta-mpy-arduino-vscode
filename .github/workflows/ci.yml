name: CI

on:
  push:
    branches:
      - main
    tags:
      - "**"
  pull_request:

jobs:
  # ----------------------------------------------------------------------
  # BUILD STAGE
  # ----------------------------------------------------------------------
  install_dependencies:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          echo "Installing dependencies..."
          npm ci

      - name: Upload dependency artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deps
          path: |
            package.json
            package-lock.json
          retention-days: 1

  # ----------------------------------------------------------------------
  # TEST STAGE
  # ----------------------------------------------------------------------
  unit_tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: install_dependencies
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 1

  integration_tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: install_dependencies
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Run integration tests
        run: npm run test:integration

  # ----------------------------------------------------------------------
  # METRICS STAGE
  # ----------------------------------------------------------------------
  quality_linting:
    name: "Quality: Linting & Types"
    runs-on: ubuntu-latest
    needs: install_dependencies
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Prettier
        run: npm run prettier

  quality_jscpd:
    name: "Quality: Duplicate Detection"
    runs-on: ubuntu-latest
    needs: install_dependencies
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Check duplicates
        run: npm run check-duplicates

      - name: Upload duplicate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jscpd-report
          path: report/
          retention-days: 7

  # ----------------------------------------------------------------------
  # PACKAGE STAGE
  # ----------------------------------------------------------------------
  package_extension:
    name: Package Extension
    runs-on: ubuntu-latest
    needs:
      - unit_tests
      - integration_tests
      - quality_linting
      - quality_jscpd
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    outputs:
      vsix_file: ${{ steps.package.outputs.vsix_file }}
    steps:
      - uses: actions/checkout@v4
  
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
  
      - run: npm ci
  
      # Fehlende native Binaries für alle Plattformen herunterladen
      - name: Download native bindings for all platforms
        run: |
          cd node_modules/@serialport/bindings-cpp
          npx prebuild-install@7.1.3 --platform win32 --arch arm64 --tag-prefix v --runtime electron --target 39.8.8 --verbose || true
          npx prebuild-install@7.1.3 --platform win32 --arch x64   --tag-prefix v --runtime electron --target 39.8.8 --verbose || true
          npx prebuild-install@7.1.3 --platform darwin --arch arm64 --tag-prefix v --runtime electron --target 39.8.8 --verbose || true
          npx prebuild-install@7.1.3 --platform darwin --arch x64   --tag-prefix v --runtime electron --target 39.8.8 --verbose || true
          npx prebuild-install@7.1.3 --platform linux  --arch x64   --tag-prefix v --runtime electron --target 39.8.8 --verbose || true
  
      - name: Package extension
        id: package
        run: |
          npm run package
          VSIX=$(ls *.vsix)
          echo "vsix_file=${VSIX}" >> "$GITHUB_OUTPUT"
  
      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: "*.vsix"
          retention-days: 7

  # ----------------------------------------------------------------------
  # RELEASE STAGE
  # ----------------------------------------------------------------------
  create_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: package_extension
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix

      - name: Create release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ github.ref_name }}"
          body: "MicroPython for Arduino VS Code Extension ${{ github.ref_name }}"
          files: ${{ needs.package_extension.outputs.vsix_file }}

  # ----------------------------------------------------------------------
  # PUBLISH STAGE — VS Code Marketplace
  # ----------------------------------------------------------------------
  publish_marketplace:
    name: Publish to VS Code Marketplace
    runs-on: ubuntu-latest
    needs:
      - create_release
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          VSIX=$(ls *.vsix)
          echo "Publishing ${VSIX}..."
          npx @vscode/vsce publish --packagePath "${VSIX}"
